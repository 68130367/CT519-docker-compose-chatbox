services:
  app:
    build: .
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/chatbox
      - REDIS_URL=redis://redis:6379
    depends_on:
      - mongo
      - redis

  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine

volumes:
  mongo_data:
